name: CI — Node.js services

on:
  push:
    paths:
      - 'services/gateway/**'
      - 'services/tenant-api/**'
  pull_request:
    paths:
      - 'services/gateway/**'
      - 'services/tenant-api/**'

jobs:
  gateway:
    name: gateway — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test -- --coverage

      - name: Coverage gate (80% application layer)
        run: npx jest --coverage --coverageThreshold='{"global":{"lines":80}}'

  tenant-api:
    name: tenant-api — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tenant-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/tenant-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test -- --coverage
