name: CI — Node.js services

on:
  push:
    paths:
      - 'services/gateway/**'
      - 'services/tenant-api/**'
  pull_request:
    paths:
      - 'services/gateway/**'
      - 'services/tenant-api/**'

jobs:
  gateway:
    name: gateway — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: services/gateway/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test -- --coverage

      - name: Coverage gate (80% application layer)
        run: pnpm exec jest --coverage --coverageThreshold='{"global":{"lines":80}}'

  tenant-api:
    name: tenant-api — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tenant-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: services/tenant-api/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test -- --coverage
