# Redis 7 configuration for WhatsApp AI SaaS
# -------------------------------------------

# Persistence: AOF for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ACL file — defines all users (default user is disabled)
aclfile /usr/local/etc/redis/users.acl

# Bind to all interfaces inside the Docker network
bind 0.0.0.0

# Disable protected-mode so healthcheck can reach it from within the container
protected-mode no

# Connection limits
maxclients 100

# Memory policy: evict least-recently-used keys when memory is full
# Streams should not be evicted; their MAXLEN caps handle memory bounds.
maxmemory-policy noeviction

# Disable the default user's implicit password (enforced via ACL file)
# requirepass is intentionally not set; auth is handled per-user in the ACL.
